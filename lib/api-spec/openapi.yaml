openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: webhooks
    description: Inbound webhook receivers
  - name: users
    description: Concierge users and their profiles
  - name: threads
    description: iMessage threads (1:1 and group)
  - name: bookings
    description: Draft bookings awaiting human approval
  - name: activation
    description: Activation funnel metrics
  - name: operations
    description: Operational health and monitoring metrics
  - name: emulator
    description: In-app conversation emulator (test mode — no real iMessages sent)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /webhooks/sendblue-status/{secret}:
    post:
      operationId: receiveSendblueStatusWebhook
      tags: [webhooks]
      summary: Receive Sendblue delivery-status and compliance events
      description: >
        Handles outbound delivery status updates (ERROR, DELIVERED, etc.) and
        compliance events (line_blocked). Auth uses the same shared-secret-in-URL
        scheme as the inbound webhook. Responds 200 immediately; side-effects
        (DB writes, mute operations) happen inline.
      parameters:
        - name: secret
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendblueWebhookEvent"
      responses:
        "200":
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

  /webhooks/sendblue/{secret}:
    post:
      operationId: receiveSendblueWebhook
      tags: [webhooks]
      summary: Receive a Sendblue webhook event
      description: >
        Receives inbound message, outbound status, and other Sendblue webhook
        events. The exact payload shape varies by event type, so unknown
        fields are accepted. The `secret` path segment is a shared secret
        (SENDBLUE_WEBHOOK_SECRET) that must match before the event is
        processed -- this is what this URL should be configured on Sendblue's
        side, and it is the only authenticity check available since Sendblue
        does not sign webhook payloads.
      parameters:
        - name: secret
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendblueWebhookEvent"
      responses:
        "200":
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: Users with profile
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithProfile"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: User with profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/onboarding-nudge:
    post:
      operationId: sendOnboardingNudge
      tags: [users]
      summary: Manually send a stalled-onboarding follow-up DM to a user
      description: >
        Sends the same one-time follow-up nudge the scheduled scan would send
        once a user's onboarding disclosure has gone unanswered, letting ops
        intervene before the automatic 24h threshold. A no-op if the user is
        already onboarded.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Nudge sent (or skipped because onboarding is already complete)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threads:
    get:
      operationId: listThreads
      tags: [threads]
      summary: List threads
      responses:
        "200":
          description: Threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThreadSummary"

  /threads/{id}/resolve-attention:
    post:
      operationId: resolveThreadAttention
      tags: [threads]
      summary: Mark a flagged thread as resolved
      description: >
        Clears the needsAttention flag and nulls the timestamp. Called by ops
        after they have reviewed and addressed whatever triggered the flag.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Flag cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threads/{id}:
    get:
      operationId: getThread
      tags: [threads]
      summary: Get a thread with messages, participants, and polls
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Thread detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BookingStatus"
      responses:
        "200":
          description: Bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/approve:
    patch:
      operationId: approveBooking
      tags: [bookings]
      summary: Approve a pending booking
      description: >
        Marks the booking confirmed. In this build the real provider call is
        stubbed, so confirmation is simulated.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Booking is not pending approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/reject:
    patch:
      operationId: rejectBooking
      tags: [bookings]
      summary: Reject a pending booking
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Booking rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Booking is not pending approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /venues:
    get:
      operationId: listVenues
      tags: [venues]
      summary: List venues by tier
      description: >
        Powers the Concierge Ops Dashboard review queue -- defaults to
        `pending_review` so reviewers see freshly-extracted venues first.
      parameters:
        - name: tier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VenueTier"
      responses:
        "200":
          description: Venues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Venue"

  /venues/{id}:
    get:
      operationId: getVenue
      tags: [venues]
      summary: Get a venue with its extracted signals and attributes
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Venue detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenueDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /venues/{id}/approve:
    patch:
      operationId: approveVenue
      tags: [venues]
      summary: Approve a venue to Tier 1
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Venue approved to Tier 1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /venues/{id}/downgrade:
    patch:
      operationId: downgradeVenue
      tags: [venues]
      summary: Downgrade a venue to Tier 2
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Venue downgraded to Tier 2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /venues/{id}/reject:
    patch:
      operationId: rejectVenue
      tags: [venues]
      summary: Reject a venue to untiered
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Venue rejected to untiered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /operations/delivery-health:
    get:
      operationId: getDeliveryHealth
      tags: [operations]
      summary: Rolling 24-hour delivery health summary
      description: >
        Aggregates all outbound delivery-log rows from the last 24 hours.
        Success = DELIVERED or SENT; failure = ERROR or FAILED.
        BLOCKED and QUEUED rows are excluded from rate calculations.
        Per-thread breakdown sorts by successRate ascending so the worst
        threads surface first.
      parameters:
        - name: windowHours
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
      responses:
        "200":
          description: Delivery health summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryHealthSummary"

  /activation-summary:
    get:
      operationId: getActivationSummary
      tags: [activation]
      summary: Activation funnel summary for the ops dashboard
      description: >
        Returns invite counts split by acquisition source and cohort-based
        conversion to onboarding_complete for the last N days (default 7).
        Conversion is among users *created* in the window, not a global ratio.
      parameters:
        - name: windowDays
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 7
      responses:
        "200":
          description: Activation summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivationSummary"

  /emulator/threads:
    get:
      operationId: listEmulatorThreads
      tags: [emulator]
      summary: List threads for the conversation emulator
      description: Returns all threads with participants for populating the emulator thread selector.
      responses:
        "200":
          description: Threads with participants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmulatorThread"

  /emulator/message:
    post:
      operationId: sendEmulatorMessage
      tags: [emulator]
      summary: Inject a message into a thread and run the agent
      description: >
        Persists the inbound message, runs the agent synchronously (no debounce),
        and returns all outbound messages that were captured. Sendblue is never
        called and the proactive-message budget is not consumed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmulatorMessageRequest"
      responses:
        "200":
          description: Captured outbound messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmulatorMessageResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent-config:
    get:
      operationId: getAgentConfig
      tags: [operations]
      summary: Get agent configuration
      description: >
        Returns the current admin-controlled agent configuration.
        The `persona` key falls back to the built-in default when not yet saved
        to the database, so the Settings page is always pre-populated.
      responses:
        "200":
          description: Current agent configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
    put:
      operationId: updateAgentConfig
      tags: [operations]
      summary: Update agent configuration
      description: >
        Upserts one or both config keys independently. Only supplied fields are
        written; omitted fields are left unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentConfig"
      responses:
        "200":
          description: Config saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /venue-population-runs:
    get:
      operationId: listVenuePopulationRuns
      tags: [venues]
      summary: List recent venue population runs
      description: Returns the 50 most recent venue population runs, ordered by createdAt DESC.
      responses:
        "200":
          description: Population runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VenuePopulationRun"
    post:
      operationId: createVenuePopulationRun
      tags: [venues]
      summary: Start a venue population run
      description: >
        Inserts a new run record (status=running) and fires populateNeighborhood
        as a background task. Returns the new run immediately. Only one run
        may be in progress at a time; a 409 is returned if another is running.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVenuePopulationRunRequest"
      responses:
        "201":
          description: Run created and started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenuePopulationRun"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A run is already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    AgentConfig:
      type: object
      properties:
        globalGuidance:
          type: string
          description: >
            Cross-cutting ops corrections injected into every agent turn after
            the persona block. Leave blank to use default behavior.
        persona:
          type: string
          description: >
            Voice, tone, and behavioral principles for the bot. Injected between
            SYSTEM_PROMPT and globalGuidance on every agent turn. Falls back to
            the built-in default when not yet saved to the database.

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageDeliveryLog:
      type: object
      required: [id, status, createdAt]
      properties:
        id:
          type: integer
        messageHandle:
          type: ["string", "null"]
        recipientPhone:
          type: ["string", "null"]
        status:
          type: string
          description: ERROR, FAILED, DELIVERED, SENT, QUEUED, or BLOCKED
        errorCode:
          type: ["string", "null"]
        threadId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    SendblueWebhookEvent:
      type: object
      description: Passthrough Sendblue webhook payload; unknown fields allowed.
      additionalProperties: true
      properties:
        message_handle:
          type: string
        from_number:
          type: string
        number:
          type: string
        content:
          type: string
        group_id:
          type: ["string", "null"]
        participants:
          type: array
          items:
            type: string
        is_outbound:
          type: boolean
        is_spam:
          type: boolean
          description: Set by Sendblue when recipient replied with STOP/UNSUBSCRIBE
        status:
          type: string
        date_sent:
          type: string

    WebhookAck:
      type: object
      required: [received]
      properties:
        received:
          type: boolean

    OnboardingStatus:
      type: string
      enum: [not_started, in_progress, completed]

    Profile:
      type: object
      required: [id, userId, preferences, pastChoices, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        budget:
          type: ["string", "null"]
        dietaryNeeds:
          type: ["string", "null"]
        preferences:
          type: array
          items:
            type: string
        pastChoices:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserWithProfile:
      type: object
      required: [id, phoneNumber, onboardingStatus, createdAt, updatedAt]
      properties:
        id:
          type: integer
        phoneNumber:
          type: string
        displayName:
          type: ["string", "null"]
        onboardingStatus:
          $ref: "#/components/schemas/OnboardingStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        profile:
          oneOf:
            - $ref: "#/components/schemas/Profile"
            - type: "null"
        onboardingDisclosedAt:
          description: >
            Earliest time an onboarding disclosure DM was sent to this user
            while they were still not `completed` -- i.e. how long they've
            been stalled. Null if never disclosed or already completed.
          type: ["string", "null"]
          format: date-time
        onboardingNudgedAt:
          description: Most recent stalled-onboarding follow-up nudge sent to this user, if any.
          type: ["string", "null"]
          format: date-time

    ThreadParticipantSummary:
      type: object
      required: [userId, phoneNumber, role]
      properties:
        userId:
          type: integer
        phoneNumber:
          type: string
        displayName:
          type: ["string", "null"]
        role:
          type: string

    ThreadSummary:
      type: object
      required: [id, isGroup, participants, needsAttention, createdAt, updatedAt]
      properties:
        id:
          type: integer
        isGroup:
          type: boolean
        title:
          type: ["string", "null"]
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ThreadParticipantSummary"
        lastMessagePreview:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
          format: date-time
        needsAttention:
          type: boolean
          description: True when a user has sent a support-flag phrase and ops have not yet resolved it.
        needsAttentionAt:
          type: ["string", "null"]
          format: date-time
          description: Timestamp of the most recent flag, or null when never flagged or after resolution.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MessageItem:
      type: object
      required: [id, threadId, direction, role, content, createdAt]
      properties:
        id:
          type: integer
        threadId:
          type: integer
        userId:
          type: ["integer", "null"]
        direction:
          type: string
          enum: [inbound, outbound]
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    PollOptionTally:
      type: object
      required: [id, label, position, voteCount]
      properties:
        id:
          type: integer
        label:
          type: string
        position:
          type: integer
        voteCount:
          type: integer

    PollSummary:
      type: object
      required: [id, question, status, options, createdAt]
      properties:
        id:
          type: integer
        question:
          type: string
        status:
          type: string
          enum: [open, closed]
        winningOptionId:
          type: ["integer", "null"]
        options:
          type: array
          items:
            $ref: "#/components/schemas/PollOptionTally"
        createdAt:
          type: string
          format: date-time
        closedAt:
          type: ["string", "null"]
          format: date-time

    ProjectSummary:
      type: object
      description: >
        A multi-event occasion (bachelorette, trip, ...) grouping several
        plans in a thread. `type` and `status` are open text vocabularies.
      required: [id, threadId, type, honoree, honoreeUserId, organizerUserId, organizerDisplayName, dateRangeStart, dateRangeEnd, status, childPlanCount, createdAt]
      properties:
        id:
          type: integer
        threadId:
          type: integer
        type:
          type: string
          description: Occasion type slug, e.g. bachelorette, milestone_birthday, reunion, trip.
        honoree:
          type: ["string", "null"]
        honoreeUserId:
          type: ["integer", "null"]
        organizerUserId:
          type: ["integer", "null"]
          description: User ID of the project organizer who receives proposal drafts and can issue tiebreak overrides.
        organizerDisplayName:
          type: ["string", "null"]
          description: Display name of the organizer, for UI convenience.
        dateRangeStart:
          type: ["string", "null"]
          format: date-time
        dateRangeEnd:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
          description: forming, planning, active, done, or cancelled.
        childPlanCount:
          type: integer
        timeline:
          type: ["object", "null"]
          description: Instantiated playbook timeline for this project, if any.
          required: [total, done, nextStep]
          properties:
            total:
              type: integer
              description: Total number of timeline steps.
            done:
              type: integer
              description: Number of steps that are done or skipped.
            nextStep:
              type: ["object", "null"]
              description: The next pending step, ordered by due date.
              required: [title, dueAt]
              properties:
                title:
                  type: string
                dueAt:
                  type: ["string", "null"]
                  format: date-time
        ledger:
          type: ["object", "null"]
          description: Payment ledger summary for this project, when cost tracking is active.
          required: [totalEstimatedCents, totalCollectedCents, outstandingCount]
          properties:
            totalEstimatedCents:
              type: integer
              description: Sum of all per-person estimate entries in cents.
            totalCollectedCents:
              type: integer
              description: Sum of all confirmed payment entries in cents.
            outstandingCount:
              type: integer
              description: Number of members with an outstanding balance greater than zero.
        destination:
          type: ["string", "null"]
          description: >
            Locked destination city/region for trip projects (e.g. "Nashville").
            Null when the group has not yet decided on a destination.
        openActionItemCount:
          type: integer
          description: Number of open (pending or in_progress) organizer-created action items for this project.
        commitment:
          type: ["object", "null"]
          description: Active commitment round for this project, if any. Null when no round has been started.
          required: [deadline, headcountTarget, committedCount, totalCount, lockedAt, lockedCount]
          properties:
            deadline:
              type: string
              format: date-time
              description: When headcount locks.
            headcountTarget:
              type: ["integer", "null"]
              description: Target committed count the organizer specified, or null if not set.
            committedCount:
              type: integer
              description: Number of participants who have replied I'm in.
            totalCount:
              type: integer
              description: Total participant count (committed + uncommitted).
            lockedAt:
              type: ["string", "null"]
              format: date-time
              description: When the headcount was locked, or null if not yet locked.
            lockedCount:
              type: ["integer", "null"]
              description: The final locked headcount, or null if not yet locked.
        createdAt:
          type: string
          format: date-time

    ThreadDetail:
      type: object
      required: [id, isGroup, participants, messages, polls, project, needsAttention, createdAt, updatedAt]
      properties:
        id:
          type: integer
        isGroup:
          type: boolean
        title:
          type: ["string", "null"]
        adminNotes:
          type: ["string", "null"]
          description: Ops-only steering notes injected into the agent system prompt for this thread.
        needsAttention:
          type: boolean
          description: True when a user has sent a support-flag phrase and ops have not yet resolved it.
        needsAttentionAt:
          type: ["string", "null"]
          format: date-time
          description: Timestamp of the most recent flag, or null when never flagged or after resolution.
        project:
          description: The thread's active multi-event project, or null when none is in flight.
          anyOf:
            - $ref: "#/components/schemas/ProjectSummary"
            - type: "null"
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ThreadParticipantSummary"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/MessageItem"
        polls:
          type: array
          items:
            $ref: "#/components/schemas/PollSummary"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BookingStatus:
      type: string
      enum: [drafted, pending_approval, approved, rejected, confirmed]

    Booking:
      type: object
      required: [id, threadId, title, details, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        threadId:
          type: integer
        createdByUserId:
          type: ["integer", "null"]
        approverUserId:
          type: ["integer", "null"]
        approverPhoneNumber:
          type: ["string", "null"]
        title:
          type: string
        details:
          type: object
          additionalProperties: true
        status:
          $ref: "#/components/schemas/BookingStatus"
        provider:
          type: ["string", "null"]
        providerBookingId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        decidedAt:
          type: ["string", "null"]
          format: date-time

    VenueTier:
      type: string
      enum: [pending_review, tier1, tier2, untiered]

    Venue:
      type: object
      required: [id, name, venueType, neighborhood, city, tier, firstPartyWeight, closureSuspected, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        venueType:
          type: string
        neighborhood:
          type: string
        borough:
          type: ["string", "null"]
        city:
          type: string
        address:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        tier:
          $ref: "#/components/schemas/VenueTier"
        compositeScore:
          type: ["string", "null"]
        firstPartyWeight:
          type: string
        closureSuspected:
          type: boolean
        candidateSourceRef:
          type: ["string", "null"]
        googlePlaceId:
          type: ["string", "null"]
          description: Google Place ID, used to fetch photo carousels at recommendation time. Populated by ops reviewers via the admin dashboard.
        lastValidatedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VenueSignal:
      type: object
      required: [id, venueId, source, value, confidence, sourceUrls, schemaVersion, extractedAt]
      properties:
        id:
          type: integer
        venueId:
          type: integer
        source:
          type: string
        value:
          type: object
          additionalProperties: true
        confidence:
          type: string
        sourceUrls:
          type: array
          items:
            type: string
        schemaVersion:
          type: integer
        extractedAt:
          type: string
          format: date-time

    VenueAttribute:
      type: object
      required: [id, venueId, dimension, value, confidence, sourceCount, sourceUrls, schemaVersion, extractedAt]
      properties:
        id:
          type: integer
        venueId:
          type: integer
        dimension:
          type: string
        value:
          type: object
          additionalProperties: true
        confidence:
          type: string
        sourceCount:
          type: integer
        sourceUrls:
          type: array
          items:
            type: string
        schemaVersion:
          type: integer
        extractedAt:
          type: string
          format: date-time

    VenueDetail:
      type: object
      required: [venue, signals, attributes]
      properties:
        venue:
          $ref: "#/components/schemas/Venue"
        signals:
          type: array
          items:
            $ref: "#/components/schemas/VenueSignal"
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/VenueAttribute"

    VenuePopulationRunStatus:
      type: string
      enum: [pending, running, completed, failed]

    VenuePopulationRunError:
      type: object
      required: [venueName, error]
      properties:
        venueName:
          type: string
        error:
          type: string

    VenuePopulationRun:
      type: object
      required: [id, neighborhood, venueType, limit, status, createdAt]
      properties:
        id:
          type: integer
        neighborhood:
          type: string
        borough:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        venueType:
          type: string
        customQuery:
          type: ["string", "null"]
        limit:
          type: integer
        status:
          $ref: "#/components/schemas/VenuePopulationRunStatus"
        candidatesFound:
          type: ["integer", "null"]
        venuesWritten:
          type: ["integer", "null"]
        venuesSkipped:
          type: ["integer", "null"]
        errors:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/VenuePopulationRunError"
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    DeliveryHealthByThread:
      type: object
      required: [threadId, sentCount, successCount]
      properties:
        threadId:
          type: integer
        threadTitle:
          type: ["string", "null"]
          description: Group title, primary phone number, or null for untitled threads.
        sentCount:
          type: integer
          description: Completed delivery attempts (DELIVERED + SENT + ERROR + FAILED) in the window.
        successCount:
          type: integer
          description: Successful deliveries (DELIVERED + SENT) in the window.
        successRate:
          type: ["number", "null"]
          description: Percent 0–100 (one decimal). Null when sentCount is 0.

    DeliveryHealthSummary:
      type: object
      required: [windowHours, totalSent, successCount, successRate, byThread]
      properties:
        windowHours:
          type: integer
          description: The lookback window used to compute this summary.
        totalSent:
          type: integer
          description: Total completed delivery attempts across all threads.
        successCount:
          type: integer
          description: Total successful deliveries (DELIVERED or SENT).
        successRate:
          type: ["number", "null"]
          description: Percent 0–100 (one decimal). Null when totalSent is 0.
        byThread:
          type: array
          description: Per-thread breakdown sorted by successRate ascending (worst first).
          items:
            $ref: "#/components/schemas/DeliveryHealthByThread"

    ActivationSummaryBySource:
      type: object
      required: [coldDm, groupAdd, other]
      properties:
        coldDm:
          type: integer
          description: Users who started via a cold 1:1 DM.
        groupAdd:
          type: integer
          description: Users who were added to a group first.
        other:
          type: integer
          description: Users with a null or unrecognized source (legacy rows, approvers).

    ActivationSummary:
      type: object
      required: [windowDays, totalInvites, bySource, onboardingCompleted, conversionRate]
      properties:
        windowDays:
          type: integer
          description: The lookback window used to compute this summary.
        totalInvites:
          type: integer
          description: Number of users created within the window.
        bySource:
          $ref: "#/components/schemas/ActivationSummaryBySource"
        onboardingCompleted:
          type: integer
          description: Users created in the window who have an onboarding_complete event.
        conversionRate:
          type: ["number", "null"]
          description: Percent 0–100 (one decimal). Null when totalInvites is 0.

    EmulatorParticipant:
      type: object
      required: [userId, phoneNumber, threadId]
      properties:
        userId:
          type: integer
        phoneNumber:
          type: string
        displayName:
          type: ["string", "null"]
        threadId:
          type: integer

    EmulatorThread:
      type: object
      required: [id, isGroup, participants]
      properties:
        id:
          type: integer
        isGroup:
          type: boolean
        title:
          type: ["string", "null"]
        primaryPhoneNumber:
          type: ["string", "null"]
        participants:
          type: array
          items:
            $ref: "#/components/schemas/EmulatorParticipant"

    EmulatorMessageRequest:
      type: object
      required: [threadId, senderPhone, content]
      properties:
        threadId:
          type: integer
        senderPhone:
          type: string
        content:
          type: string

    EmulatorCapturedMessage:
      type: object
      required: [threadId, content]
      properties:
        threadId:
          type: integer
        content:
          type: string
        mediaUrl:
          type: ["string", "null"]

    EmulatorMessageResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/EmulatorCapturedMessage"

    CreateVenuePopulationRunRequest:
      type: object
      required: [neighborhood]
      properties:
        neighborhood:
          type: string
          minLength: 1
        borough:
          type: string
        city:
          type: string
        venueType:
          type: string
          enum: [restaurant, bar]
          default: restaurant
        customQuery:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 200
          default: 20

