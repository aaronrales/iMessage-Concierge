openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: webhooks
    description: Inbound webhook receivers
  - name: users
    description: Concierge users and their profiles
  - name: threads
    description: iMessage threads (1:1 and group)
  - name: bookings
    description: Draft bookings awaiting human approval
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /webhooks/sendblue/{secret}:
    post:
      operationId: receiveSendblueWebhook
      tags: [webhooks]
      summary: Receive a Sendblue webhook event
      description: >
        Receives inbound message, outbound status, and other Sendblue webhook
        events. The exact payload shape varies by event type, so unknown
        fields are accepted. The `secret` path segment is a shared secret
        (SENDBLUE_WEBHOOK_SECRET) that must match before the event is
        processed -- this is what this URL should be configured on Sendblue's
        side, and it is the only authenticity check available since Sendblue
        does not sign webhook payloads.
      parameters:
        - name: secret
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendblueWebhookEvent"
      responses:
        "200":
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: Users with profile
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithProfile"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: User with profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/onboarding-nudge:
    post:
      operationId: sendOnboardingNudge
      tags: [users]
      summary: Manually send a stalled-onboarding follow-up DM to a user
      description: >
        Sends the same one-time follow-up nudge the scheduled scan would send
        once a user's onboarding disclosure has gone unanswered, letting ops
        intervene before the automatic 24h threshold. A no-op if the user is
        already onboarded.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Nudge sent (or skipped because onboarding is already complete)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /threads:
    get:
      operationId: listThreads
      tags: [threads]
      summary: List threads
      responses:
        "200":
          description: Threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThreadSummary"

  /threads/{id}:
    get:
      operationId: getThread
      tags: [threads]
      summary: Get a thread with messages, participants, and polls
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Thread detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BookingStatus"
      responses:
        "200":
          description: Bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/approve:
    patch:
      operationId: approveBooking
      tags: [bookings]
      summary: Approve a pending booking
      description: >
        Marks the booking confirmed. In this build the real provider call is
        stubbed, so confirmation is simulated.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Booking is not pending approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/reject:
    patch:
      operationId: rejectBooking
      tags: [bookings]
      summary: Reject a pending booking
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Booking rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Booking is not pending approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /venues:
    get:
      operationId: listVenues
      tags: [venues]
      summary: List venues by tier
      description: >
        Powers the Concierge Ops Dashboard review queue -- defaults to
        `pending_review` so reviewers see freshly-extracted venues first.
      parameters:
        - name: tier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VenueTier"
      responses:
        "200":
          description: Venues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Venue"

  /venues/{id}:
    get:
      operationId: getVenue
      tags: [venues]
      summary: Get a venue with its extracted signals and attributes
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Venue detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenueDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /venues/{id}/approve:
    patch:
      operationId: approveVenue
      tags: [venues]
      summary: Approve a venue to Tier 1
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Venue approved to Tier 1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /venues/{id}/downgrade:
    patch:
      operationId: downgradeVenue
      tags: [venues]
      summary: Downgrade a venue to Tier 2
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Venue downgraded to Tier 2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /venues/{id}/reject:
    patch:
      operationId: rejectVenue
      tags: [venues]
      summary: Reject a venue to untiered
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Venue rejected to untiered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SendblueWebhookEvent:
      type: object
      description: Passthrough Sendblue webhook payload; unknown fields allowed.
      additionalProperties: true
      properties:
        message_handle:
          type: string
        from_number:
          type: string
        number:
          type: string
        content:
          type: string
        group_id:
          type: ["string", "null"]
        participants:
          type: array
          items:
            type: string
        is_outbound:
          type: boolean
        status:
          type: string
        date_sent:
          type: string

    WebhookAck:
      type: object
      required: [received]
      properties:
        received:
          type: boolean

    OnboardingStatus:
      type: string
      enum: [not_started, in_progress, completed]

    Profile:
      type: object
      required: [id, userId, preferences, pastChoices, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        budget:
          type: ["string", "null"]
        dietaryNeeds:
          type: ["string", "null"]
        preferences:
          type: array
          items:
            type: string
        pastChoices:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserWithProfile:
      type: object
      required: [id, phoneNumber, onboardingStatus, createdAt, updatedAt]
      properties:
        id:
          type: integer
        phoneNumber:
          type: string
        displayName:
          type: ["string", "null"]
        onboardingStatus:
          $ref: "#/components/schemas/OnboardingStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        profile:
          oneOf:
            - $ref: "#/components/schemas/Profile"
            - type: "null"
        onboardingDisclosedAt:
          description: >
            Earliest time an onboarding disclosure DM was sent to this user
            while they were still not `completed` -- i.e. how long they've
            been stalled. Null if never disclosed or already completed.
          type: ["string", "null"]
          format: date-time
        onboardingNudgedAt:
          description: Most recent stalled-onboarding follow-up nudge sent to this user, if any.
          type: ["string", "null"]
          format: date-time

    ThreadParticipantSummary:
      type: object
      required: [userId, phoneNumber, role]
      properties:
        userId:
          type: integer
        phoneNumber:
          type: string
        displayName:
          type: ["string", "null"]
        role:
          type: string

    ThreadSummary:
      type: object
      required: [id, isGroup, participants, createdAt, updatedAt]
      properties:
        id:
          type: integer
        isGroup:
          type: boolean
        title:
          type: ["string", "null"]
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ThreadParticipantSummary"
        lastMessagePreview:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MessageItem:
      type: object
      required: [id, threadId, direction, role, content, createdAt]
      properties:
        id:
          type: integer
        threadId:
          type: integer
        userId:
          type: ["integer", "null"]
        direction:
          type: string
          enum: [inbound, outbound]
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    PollOptionTally:
      type: object
      required: [id, label, position, voteCount]
      properties:
        id:
          type: integer
        label:
          type: string
        position:
          type: integer
        voteCount:
          type: integer

    PollSummary:
      type: object
      required: [id, question, status, options, createdAt]
      properties:
        id:
          type: integer
        question:
          type: string
        status:
          type: string
          enum: [open, closed]
        winningOptionId:
          type: ["integer", "null"]
        options:
          type: array
          items:
            $ref: "#/components/schemas/PollOptionTally"
        createdAt:
          type: string
          format: date-time
        closedAt:
          type: ["string", "null"]
          format: date-time

    ThreadDetail:
      type: object
      required: [id, isGroup, participants, messages, polls, createdAt, updatedAt]
      properties:
        id:
          type: integer
        isGroup:
          type: boolean
        title:
          type: ["string", "null"]
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ThreadParticipantSummary"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/MessageItem"
        polls:
          type: array
          items:
            $ref: "#/components/schemas/PollSummary"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BookingStatus:
      type: string
      enum: [drafted, pending_approval, approved, rejected, confirmed]

    Booking:
      type: object
      required: [id, threadId, title, details, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        threadId:
          type: integer
        createdByUserId:
          type: ["integer", "null"]
        approverUserId:
          type: ["integer", "null"]
        approverPhoneNumber:
          type: ["string", "null"]
        title:
          type: string
        details:
          type: object
          additionalProperties: true
        status:
          $ref: "#/components/schemas/BookingStatus"
        provider:
          type: ["string", "null"]
        providerBookingId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        decidedAt:
          type: ["string", "null"]
          format: date-time

    VenueTier:
      type: string
      enum: [pending_review, tier1, tier2, untiered]

    Venue:
      type: object
      required: [id, name, venueType, neighborhood, city, tier, firstPartyWeight, closureSuspected, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        venueType:
          type: string
        neighborhood:
          type: string
        borough:
          type: ["string", "null"]
        city:
          type: string
        address:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        tier:
          $ref: "#/components/schemas/VenueTier"
        compositeScore:
          type: ["string", "null"]
        firstPartyWeight:
          type: string
        closureSuspected:
          type: boolean
        candidateSourceRef:
          type: ["string", "null"]
        lastValidatedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VenueSignal:
      type: object
      required: [id, venueId, source, value, confidence, sourceUrls, schemaVersion, extractedAt]
      properties:
        id:
          type: integer
        venueId:
          type: integer
        source:
          type: string
        value:
          type: object
          additionalProperties: true
        confidence:
          type: string
        sourceUrls:
          type: array
          items:
            type: string
        schemaVersion:
          type: integer
        extractedAt:
          type: string
          format: date-time

    VenueAttribute:
      type: object
      required: [id, venueId, dimension, value, confidence, sourceCount, sourceUrls, schemaVersion, extractedAt]
      properties:
        id:
          type: integer
        venueId:
          type: integer
        dimension:
          type: string
        value:
          type: object
          additionalProperties: true
        confidence:
          type: string
        sourceCount:
          type: integer
        sourceUrls:
          type: array
          items:
            type: string
        schemaVersion:
          type: integer
        extractedAt:
          type: string
          format: date-time

    VenueDetail:
      type: object
      required: [venue, signals, attributes]
      properties:
        venue:
          $ref: "#/components/schemas/Venue"
        signals:
          type: array
          items:
            $ref: "#/components/schemas/VenueSignal"
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/VenueAttribute"
