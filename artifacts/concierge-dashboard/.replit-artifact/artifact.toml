kind = "web"
previewPath = "/"
title = "Concierge Ops Dashboard"
version = "1.0.0"
id = "artifacts/concierge-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20476

[services.development]
run = "pnpm --filter @workspace/concierge-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/concierge-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/concierge-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20476"
BASE_PATH = "/"
